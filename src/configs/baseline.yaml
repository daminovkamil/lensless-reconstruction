defaults:
  - model: pre4_u5_post4
  - writer: cometml
  - metrics: lensless
  - datasets: digicam
  - dataloader: base
  - transforms: none
  - _self_
optimizer:
  _target_: torch.optim.Adam
  lr: 1e-4
  betas: [0.9, 0.999]
lr_scheduler:
  _target_: torch.optim.lr_scheduler.ConstantLR
  factor: 1.0
  total_iters: 1
loss_function:
  _target_: src.loss.LenslessLoss
  mse_weight: 1.0
  lpips_weight: 0.1
trainer:
  log_step: 50
  n_epochs: 50
  epoch_len: null
  device_tensors: ["lensless", "psf", "gt"]
  amp_dtype: "off"
  resume_from: null
  device: auto
  compile: false
  log_eval_images: 16
  log_grid_images: 8
  override: False
  monitor: "max val_PSNR"
  save_period: 5
  early_stop: 5
  save_dir: "saved"
  seed: 1
